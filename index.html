<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Países de la Unión Europea</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2 class="text-center mb-4">Países de la Unión Europea</h2>

<div class="row">
    <div class="col-md-4">
        <div class="card p-3 shadow-sm mb-4">
            <h5 class="card-title mb-3">Filtrar Países</h5>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="solo-oficiales">
                <label class="form-check-label fw-semibold" for="solo-oficiales">
                    Solo idiomas oficiales
                </label>
            </div>

            <strong class="d-block mb-2">Elige un idioma:</strong>
            <div id="radios-idiomas" class="d-flex flex-wrap gap-1"></div>

            <div id="info-filtro" class="mt-3 text-muted small fw-bold"></div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="table-responsive">
            <table class="table table-striped table-bordered align-middle">
                <thead class="table-dark">
                <tr>
                    <th>País</th>
                    <th>Capital</th>
                    <th>Población</th>
                    <th>Fecha Adhesión</th>
                </tr>
                </thead>
                <tbody id="tabla-paises">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="script.js" type="module"></script>
</body>
</html>
