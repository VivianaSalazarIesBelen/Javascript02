<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Países de la Unión Europea</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2 class="text-center mb-4">Países de la Unión Europea</h2>

<div class="row">
    <div class="col-md-4">
        <div class="card p-3 mb-4 border-0">
            <h5 class="card-title mb-3">Filtrar Países</h5>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="solo-oficiales">
                <label class="form-check-label " for="solo-oficiales">
                    Solo idiomas oficiales
                </label>
            </div>

            <strong>Elige un idioma:</strong>
            <div id="radios-idiomas" class="d-flex flex-wrap gap-1"></div>
        </div>
    </div>

    <div class="col-md-8">
        <div id="info-filtro" class="mb-3"></div>
        <div class="table-responsive">
            <table id="tabla" class="table table-bordered align-middle">
            </table>
        </div>
    </div>
</div>

<script src="script.js" type="module"></script>
</body>
</html>
